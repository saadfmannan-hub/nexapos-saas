{# Reusable dynamic line-item editor: requires Alpine. Posts product_id[], variant_id[], quantity[] #}
<div x-data="itemRows()" class="mb-3">
  <label class="form-label">Items</label>
  <div class="position-relative mb-2">
    <input type="text" class="form-control" placeholder="Type 2+ characters to search products…"
           x-model="query" @input.debounce.300ms="search" autocomplete="off">
    <div class="list-group position-absolute w-100 shadow" style="z-index:50" x-show="results.length" x-cloak>
      <template x-for="r in results" :key="r.label">
        <button type="button" class="list-group-item list-group-item-action"
                @click="add(r)" x-text="r.label + (r.sku ? ' — ' + r.sku : '')"></button>
      </template>
    </div>
  </div>
  <table class="table table-sm align-middle">
    <thead><tr><th>Item</th><th style="width:140px">Quantity</th><th style="width:40px"></th></tr></thead>
    <tbody>
      <template x-for="(row, i) in rows" :key="i">
        <tr>
          <td>
            <span x-text="row.label"></span>
            <input type="hidden" name="product_id" :value="row.product_id">
            <input type="hidden" name="variant_id" :value="row.variant_id || ''">
          </td>
          <td><input type="number" :step="row.allow_decimal ? '0.001' : '1'" {% if not allow_parent_meter_repair %}min="0.001"{% endif %} name="quantity" class="form-control form-control-sm" x-model="row.quantity"></td>
          <td><button type="button" class="btn btn-sm btn-outline-danger" @click="rows.splice(i,1)"><i class="bi bi-x"></i></button></td>
        </tr>
      </template>
      <tr x-show="!rows.length"><td colspan="3" class="text-center text-secondary small py-3">No items added yet</td></tr>
    </tbody>
  </table>
</div>
{% if initial_item_rows %}{{ initial_item_rows|json_script:"initial-item-rows" }}{% endif %}
<script>
function itemRows() {
  const initialRows = document.getElementById('initial-item-rows');
  return {
    query: '', results: [],
    rows: initialRows ? JSON.parse(initialRows.textContent) : [],
    async search() {
      if (this.query.length < 2) { this.results = []; return; }
      const r = await fetch("{% url 'inventory:item_search' %}?q=" + encodeURIComponent(this.query){% if allow_parent_meter_repair %} + "&parent_meter_repair=1"{% endif %});
      this.results = (await r.json()).results;
    },
    add(r) {
      this.rows.push({...r, quantity: 1});
      this.query = ''; this.results = [];
    }
  }
}
</script>
