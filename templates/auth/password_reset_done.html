{% extends "layouts/auth.html" %}
{% block content %}
<div class="text-center py-3">
  <i class="bi bi-envelope-check fs-1 text-success"></i>
  <h5 class="fw-bold mt-2">Check your email</h5>
  <p class="small text-secondary">If an account exists for that address, a password
  reset link has been sent.</p>
  <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary btn-sm">Back to sign in</a>
</div>
{% endblock %}
