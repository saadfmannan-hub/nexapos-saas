{% extends "layouts/base.html" %}
{% block title %}Change password — {{ PRODUCT_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-header">Change password</div>
      <div class="card-body">
        <form method="post">{% csrf_token %}
          {% for field in form %}{% include "components/form_field.html" %}{% endfor %}
          <button class="btn btn-primary">Update password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
