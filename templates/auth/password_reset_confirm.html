{% extends "layouts/auth.html" %}
{% block content %}
<h5 class="fw-bold mb-3">Choose a new password</h5>
{% if validlink %}
<form method="post">
  {% csrf_token %}
  {% for field in form %}{% include "components/form_field.html" %}{% endfor %}
  <button class="btn btn-primary w-100">Set new password</button>
</form>
{% else %}
<div class="alert alert-danger">This reset link is invalid or has expired.
  <a href="{% url 'accounts:password_reset' %}">Request a new one</a>.</div>
{% endif %}
{% endblock %}
