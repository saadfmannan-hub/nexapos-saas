{% extends "layouts/auth.html" %}
{% block content %}
<h5 class="fw-bold mb-3">Reset password</h5>
<p class="small text-secondary">Enter your account email and we'll send a reset link.</p>
<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" name="email" class="form-control" required autofocus>
  </div>
  <button class="btn btn-primary w-100">Send reset link</button>
</form>
<hr>
<div class="text-center small"><a href="{% url 'accounts:login' %}">Back to sign in</a></div>
{% endblock %}
