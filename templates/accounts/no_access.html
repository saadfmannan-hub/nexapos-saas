{% extends "layouts/auth.html" %}
{% block title %}No access assigned - {{ PRODUCT_NAME }}{% endblock %}
{% block content %}
<div class="text-center py-3">
  <i class="bi bi-shield-lock fs-1 text-secondary"></i>
  <h5 class="fw-bold mt-2">No access assigned</h5>
  <p class="small text-secondary">Your account is active, but no module access has been assigned. Please contact your administrator.</p>
  <form method="post" action="{% url 'accounts:logout' %}">
    {% csrf_token %}
    <button class="btn btn-outline-secondary btn-sm">Sign out</button>
  </form>
</div>
{% endblock %}
