{% extends "layouts/auth.html" %}
{% block content %}
<div class="text-center py-3">
  <i class="bi bi-shop fs-1 text-secondary"></i>
  <h5 class="fw-bold mt-2">No business workspace</h5>
  <p class="small text-secondary">Your account is not a member of any active business.
  Ask your business owner to add you, or register a new business.</p>
  <a href="{% url 'tenants:register' %}" class="btn btn-primary btn-sm">Register a business</a>
  <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">{% csrf_token %}
    <button class="btn btn-outline-secondary btn-sm">Sign out</button>
  </form>
</div>
{% endblock %}
