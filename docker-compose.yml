services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexapos
      POSTGRES_USER: nexapos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexapos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexapos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://nexapos:${POSTGRES_PASSWORD:-nexapos}@db:5432/nexapos
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://nexapos:${POSTGRES_PASSWORD:-nexapos}@db:5432/nexapos
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://nexapos:${POSTGRES_PASSWORD:-nexapos}@db:5432/nexapos
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  media:
